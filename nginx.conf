server {
    listen 8082 default_server;
    listen [::]:8082 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Cache de assets con hash en el nombre
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Archivos estáticos primero, 404 si no existen
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Páginas de error servidas desde el propio sitio
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
    location = /404.html { internal; }
    location = /500.html { internal; }

    # No exponer nginx internals
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
